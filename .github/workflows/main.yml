name: Build and Deploy to AKS

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: coreapi

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Login to Azure
    - name: Azure Login
      uses: azure/login@v1
     with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

    # 3️⃣ Login to ACR
    - name: Login to ACR
      run: |
        az acr login --name ${{ secrets.ACR_NAME }}

    # 4️⃣ Build Docker image
    - name: Build Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

    # 5️⃣ Push image to ACR
    - name: Push Image
      run: |
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # 6️⃣ Set AKS context
    - name: Set AKS Context
      run: |
        az aks get-credentials \
          --resource-group ${{ secrets.RESOURCE_GROUP }} \
          --name ${{ secrets.AKS_CLUSTER_NAME }}

    # 7️⃣ Deploy to Kubernetes
    - name: Deploy to AKS
      run: |
        kubectl set image deployment/myapp \
        myapp=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
